services:
  db:
    image: postgres
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: local
    volumes:
      - pgdata:/var/lib/postgresql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file: .env
    restart: unless-stopped
    depends_on:
      - db
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://0.0.0.0:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - prod

  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    env_file: .env
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - prod

volumes:
  pgdata:
